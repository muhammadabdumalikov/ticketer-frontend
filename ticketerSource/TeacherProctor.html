<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440, initial-scale=1" />
<title>Ticketer — Прокторинг</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #ECECEC;
    --panel: #F6F6F6;
    --card: #FFFFFF;
    --ink: #0A0A0A;
    --ink-2: #1A1A1A;
    --ink-3: #2E2E2E;
    --muted: #8A8A8A;
    --muted-2: #B8B8B8;
    --line: #E7E7E7;
    --line-2: #EFEFEF;
    --accent: #FF4D1F;
    --accent-soft: #FFEDE6;
    --field: #F4F4F4;
    --field-2: #F8F8F8;
    --green: #1F9D55;
    --green-soft: #E4F4EC;
    --shadow-card: 0 1px 2px rgba(0,0,0,.04), 0 24px 60px -20px rgba(0,0,0,.10);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased; letter-spacing: -0.005em;
  }

  .stage { min-height: 100vh; padding: 24px; display: grid; place-items: start center; }
  .frame {
    width: min(1320px, 100%);
    background: var(--panel);
    border-radius: 28px;
    box-shadow: var(--shadow-card);
    padding: 14px; display: flex; flex-direction: column; gap: 12px;
  }

  /* Topbar */
  .top {
    background: #fff; border-radius: 18px;
    padding: 14px 20px; min-height: 72px;
    display: flex; align-items: center; gap: 16px;
  }
  .top .crumbs {
    display: flex; align-items: center; gap: 10px;
    font-size: 14.5px; color: var(--muted);
  }
  .top .crumbs b { color: var(--ink); font-weight: 500; }
  .top .crumbs .sep { color: var(--muted-2); }
  .top .spacer { flex: 1; }
  .top .session-pill {
    background: var(--green-soft); color: var(--green);
    padding: 8px 14px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Geist Mono', monospace; font-size: 12.5px;
    letter-spacing: .04em;
  }
  .top .session-pill .led {
    width: 7px; height: 7px; border-radius: 999px; background: var(--green);
    box-shadow: 0 0 0 3px rgba(31,157,85,.18);
  }
  .top .icon-btn {
    width: 40px; height: 40px; border-radius: 999px; background: var(--field);
    display: grid; place-items: center; color: var(--ink-2); cursor: pointer;
  }

  /* Layout */
  .body {
    display: grid; grid-template-columns: 280px 1fr 320px; gap: 12px;
    min-height: 640px;
  }

  /* Left: roster */
  .roster {
    background: #fff; border-radius: 22px; padding: 18px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .roster h3 {
    margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
    display: flex; justify-content: space-between; align-items: center;
  }
  .roster h3 .count {
    font-family: 'Geist Mono', monospace; font-size: 12px;
    color: var(--muted); background: var(--field); padding: 3px 8px; border-radius: 999px;
  }
  .roster-list { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; max-height: 560px; padding-right: 4px; }
  .r-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 11px; cursor: pointer;
    font-size: 13.5px; color: var(--ink-3);
    transition: background .12s;
  }
  .r-row:hover { background: var(--field-2); }
  .r-row.active {
    background: var(--ink); color: #fff;
  }
  .r-row.active .av { background: var(--accent); }
  .r-row .av {
    width: 28px; height: 28px; border-radius: 999px; flex: none;
    display: grid; place-items: center;
    font-size: 11.5px; font-weight: 600; color: #fff;
    background: linear-gradient(135deg, #2A2A2A, #4a4a4a);
  }
  .r-row .name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
  .r-row .status {
    width: 9px; height: 9px; border-radius: 999px; background: var(--muted-2); flex: none;
  }
  .r-row .status.done { background: var(--green); }
  .r-row .status.live { background: var(--accent); box-shadow: 0 0 0 3px rgba(255,77,31,.18); }
  .r-row .ticket {
    font-family: 'Geist Mono', monospace; font-size: 10.5px;
    background: var(--field); color: var(--muted);
    padding: 2px 7px; border-radius: 999px;
  }
  .r-row.active .ticket { background: rgba(255,255,255,.12); color: rgba(255,255,255,.85); }

  /* Center: stage */
  .center {
    background: #fff; border-radius: 22px; padding: 28px 32px 24px;
    display: flex; flex-direction: column; gap: 24px;
  }

  .student-card {
    background: var(--field-2); border-radius: 18px;
    padding: 18px 22px;
    display: flex; align-items: center; gap: 16px;
  }
  .student-card .av-lg {
    width: 56px; height: 56px; border-radius: 999px; flex: none;
    display: grid; place-items: center;
    background: var(--accent); color: #fff;
    font-size: 18px; font-weight: 600; letter-spacing: -0.01em;
  }
  .student-card .who { flex: 1; min-width: 0; }
  .student-card .name { font-size: 19px; font-weight: 600; letter-spacing: -0.02em; }
  .student-card .meta {
    color: var(--muted); font-size: 13.5px; margin-top: 2px;
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .student-card .meta b { color: var(--ink-2); font-weight: 500; }
  .student-card .ticket-pill {
    background: #fff; color: var(--ink);
    padding: 7px 14px; border-radius: 999px;
    font-family: 'Geist Mono', monospace; font-size: 13px;
    box-shadow: var(--shadow-sm);
  }

  .question-block h2 { margin: 0 0 6px; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .question-block .qcap { color: var(--muted); font-size: 13.5px; font-style: italic; margin-bottom: 12px; }
  .question-block p { margin: 0; font-size: 16px; line-height: 1.55; color: var(--ink); text-wrap: pretty; }

  /* Timer stage — the centerpiece */
  .timer-stage {
    background: linear-gradient(180deg, #FAFAFA 0%, #F4F4F4 100%);
    border-radius: 22px;
    padding: 36px 32px 32px;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
    border: 1px solid var(--line-2);
    transition: background .25s, border-color .25s;
  }
  .timer-stage.recording {
    background: #FFF7F2;
    border-color: var(--accent);
  }
  .timer-stage.finished {
    background: var(--green-soft);
    border-color: var(--green);
  }

  .timer-state {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Geist Mono', monospace; font-size: 11.5px;
    color: var(--muted); text-transform: uppercase; letter-spacing: .12em;
  }
  .timer-state .led {
    width: 8px; height: 8px; border-radius: 999px; background: var(--muted-2);
  }
  .timer-stage.recording .timer-state { color: var(--accent); }
  .timer-stage.recording .timer-state .led {
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(255,77,31,.16);
    animation: blink 1.2s ease-in-out infinite;
  }
  .timer-stage.finished .timer-state { color: var(--green); }
  .timer-stage.finished .timer-state .led { background: var(--green); }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  .timer-display {
    font-family: 'Geist Mono', monospace;
    font-size: 120px; font-weight: 500; letter-spacing: -0.04em;
    line-height: 1; color: var(--ink);
    font-variant-numeric: tabular-nums;
    margin: 4px 0;
  }
  .timer-limit {
    color: var(--muted); font-size: 14px;
    font-family: 'Geist Mono', monospace; letter-spacing: .04em;
  }
  .timer-limit b { color: var(--ink-2); font-weight: 500; }
  .timer-limit.warn { color: var(--accent); }

  .timer-actions { display: flex; gap: 10px; }
  .big-btn {
    appearance: none; border: 0; cursor: pointer; font: inherit;
    padding: 18px 32px; border-radius: 14px;
    display: inline-flex; align-items: center; gap: 12px;
    font-size: 16px; font-weight: 500; letter-spacing: -0.005em;
    transition: transform .08s, background .15s, color .15s, box-shadow .15s;
    min-width: 220px; justify-content: center;
  }
  .big-btn:active { transform: translateY(1px); }
  .big-btn.start {
    background: var(--ink); color: #fff;
    box-shadow: 0 6px 16px -6px rgba(0,0,0,.4);
  }
  .big-btn.start:hover { background: #1f1f1f; }
  .big-btn.stop {
    background: var(--accent); color: #fff;
    box-shadow: 0 6px 16px -6px rgba(255,77,31,.4);
  }
  .big-btn.stop:hover { background: #ff5f37; }
  .big-btn.reset {
    background: #fff; color: var(--ink-2);
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .big-btn.reset:hover { background: var(--field-2); }
  .big-btn .rec-dot {
    width: 10px; height: 10px; border-radius: 999px; background: #fff;
    animation: blink 1.2s ease-in-out infinite;
  }

  /* Rating row (below timer, in center column) */
  .rating-card {
    background: var(--field-2); border-radius: 18px;
    padding: 20px 24px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .rating-head {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .rating-head h4 {
    margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
  }
  .rating-head .score {
    font-family: 'Geist Mono', monospace; font-size: 22px; font-weight: 500;
    letter-spacing: -0.02em; color: var(--ink);
  }
  .rating-head .score small { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 2px; }

  .stars { display: flex; align-items: center; gap: 6px; }
  .star {
    width: 38px; height: 38px; border-radius: 8px;
    display: grid; place-items: center; cursor: pointer;
    color: var(--muted-2); background: #fff;
    transition: color .12s, background .12s, transform .08s;
  }
  .star:hover { transform: scale(1.06); color: var(--accent); background: #FFF8F4; }
  .star.on { color: var(--accent); }
  .star svg { width: 22px; height: 22px; stroke-width: 1.6; stroke-linejoin: round; }

  .rating-actions {
    display: flex; gap: 10px; padding-top: 6px;
    border-top: 1px solid var(--line);
  }
  .rating-actions .btn {
    appearance: none; border: 0; cursor: pointer; font: inherit;
    padding: 11px 16px; border-radius: 11px;
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13.5px; font-weight: 500;
  }
  .rating-actions .btn.primary { background: var(--ink); color: #fff; flex: 1; justify-content: center; }
  .rating-actions .btn.primary:hover { background: #1f1f1f; }
  .rating-actions .btn.ghost { background: #fff; color: var(--ink-2); box-shadow: inset 0 0 0 1px var(--line); }
  .rating-actions .btn.ghost:hover { background: var(--field); }

  /* Right rail: rubric + notes */
  .rail {
    background: #fff; border-radius: 22px; padding: 18px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .rail-section h4 {
    margin: 0 0 8px; font-size: 11.5px; font-weight: 500;
    font-family: 'Geist Mono', monospace; letter-spacing: .1em;
    color: var(--muted); text-transform: uppercase;
  }
  .rail-section .body-text {
    font-size: 14px; line-height: 1.55; color: var(--ink-3);
  }
  .rubric-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .rubric-list li {
    display: flex; gap: 10px; align-items: flex-start;
    font-size: 13.5px; line-height: 1.45; color: var(--ink-3);
    background: var(--field-2); border-radius: 10px; padding: 10px 12px;
  }
  .rubric-list li .ic {
    flex: none; width: 16px; height: 16px; border-radius: 999px;
    background: var(--accent); color: #fff;
    display: grid; place-items: center; font-size: 10px;
    font-family: 'Geist Mono', monospace; font-weight: 500;
    margin-top: 1px;
  }
  .notes-area {
    width: 100%; min-height: 110px;
    appearance: none; border: 1px solid transparent; outline: none; resize: vertical;
    background: var(--field-2); border-radius: 12px;
    padding: 10px 12px; font: inherit; font-size: 13.5px; color: var(--ink);
    line-height: 1.5;
    transition: background .15s, border-color .15s;
  }
  .notes-area:focus { background: #fff; border-color: var(--ink); }

  .queue-card {
    background: var(--field-2); border-radius: 12px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--ink-3);
  }
  .queue-card .nxt {
    font-family: 'Geist Mono', monospace; font-size: 10.5px;
    color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
  }

  /* Tweaks padding */
  body.tweaks-open .stage { padding-right: 320px; }

  /* ---------- Toast ---------- */
  .toast-overlay {
    position: fixed; inset: 0; z-index: 1000;
    pointer-events: none;
    display: grid; place-items: center;
    animation: toastFade .18s ease-out;
  }
  @keyframes toastFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes toastPop {
    from { opacity: 0; transform: translateY(8px) scale(.97); }
    to   { opacity: 1; transform: none; }
  }
  .toast-card {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 24px 60px -16px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.06);
    padding: 18px 24px 18px 20px;
    display: flex; align-items: center; gap: 16px;
    max-width: 460px;
    animation: toastPop .22s cubic-bezier(.2,.7,.2,1);
  }
  .toast-icon {
    width: 44px; height: 44px; border-radius: 999px;
    background: var(--green-soft); color: var(--green);
    display: grid; place-items: center; flex: none;
  }
  .toast-icon svg { width: 22px; height: 22px; stroke-width: 2.4; }
  .toast-title {
    font-size: 16px; font-weight: 600; letter-spacing: -0.015em; color: var(--ink);
  }
  .toast-sub {
    color: var(--muted); font-size: 13px; margin-top: 2px; line-height: 1.4;
  }

  @media (max-width: 1280px) {
    .body { grid-template-columns: 1fr; }
    .roster, .rail { display: none; }
  }
</style>
</head>
<body>

<div id="root"></div>

</body>
