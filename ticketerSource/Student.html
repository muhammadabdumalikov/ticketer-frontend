<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440, initial-scale=1" />
<title>Ticketer — Экзамен</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #ECECEC;
    --panel: #F6F6F6;
    --card: #FFFFFF;
    --ink: #0A0A0A;
    --ink-2: #1A1A1A;
    --ink-3: #2E2E2E;
    --muted: #8A8A8A;
    --muted-2: #B8B8B8;
    --line: #E7E7E7;
    --line-2: #EFEFEF;
    --accent: #FF4D1F;
    --accent-soft: #FFEDE6;
    --field: #F4F4F4;
    --field-2: #F8F8F8;
    --green: #1F9D55;
    --green-soft: #E4F4EC;
    --blue: #0F62FE;
    --shadow-card: 0 1px 2px rgba(0,0,0,.04), 0 24px 60px -20px rgba(0,0,0,.10);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --radius-card: 28px;
    --radius-panel: 22px;
    --radius-field: 14px;
    --radius-btn: 12px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.005em;
  }

  /* ---------- Stage ---------- */
  .stage {
    min-height: 100vh; padding: 24px;
    display: grid; place-items: start center;
  }
  .frame {
    width: min(1320px, 100%);
    background: var(--panel);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    padding: 14px;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* ---------- Topbar (matches the original reference) ---------- */
  .top {
    background: #fff;
    border-radius: 18px;
    padding: 14px 20px;
    display: flex; align-items: center; gap: 16px;
    min-height: 72px;
  }
  .top .title {
    display: flex; align-items: center; gap: 10px;
    font-size: 19px; font-weight: 600; letter-spacing: -0.025em;
  }
  .top .title .info {
    width: 22px; height: 22px; border-radius: 999px;
    border: 1.5px solid var(--muted-2); color: var(--muted);
    display: grid; place-items: center; font-size: 12px; cursor: pointer;
    font-family: 'Geist Mono', monospace;
  }
  .top .spacer { flex: 1; }
  .top .pill-time {
    background: #F1F1F1; border-radius: 999px; padding: 8px 16px;
    font-family: 'Geist Mono', monospace; font-size: 15px;
    display: flex; align-items: center; gap: 8px; color: var(--ink);
  }
  .top .pill-time.warn { background: var(--accent-soft); color: var(--accent); }
  .top .tools { display: flex; gap: 8px; }
  .top .tool {
    width: 40px; height: 40px; border-radius: 999px; background: #F1F1F1;
    display: grid; place-items: center; color: var(--ink-2); cursor: pointer;
    transition: background .15s, color .15s;
  }
  .top .tool:hover { background: #E8E8E8; }
  .top .tool.danger { background: var(--accent-soft); color: var(--accent); }
  .top .tool.danger:hover { background: #FFE0D6; }

  /* ---------- Generic buttons ---------- */
  .btn {
    appearance: none; border: 0; cursor: pointer; font: inherit; font-size: 14px;
    padding: 12px 18px; border-radius: var(--radius-btn);
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    font-weight: 500; letter-spacing: -0.005em; white-space: nowrap;
    transition: transform .08s, background .15s, color .15s;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--ink); color: #fff; }
  .btn-primary:hover { background: #1f1f1f; }
  .btn-ghost { background: var(--field); color: var(--ink-2); }
  .btn-ghost:hover { background: #ECECEC; }
  .btn-outline {
    background: #fff; color: var(--ink-2);
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .btn-outline:hover { background: var(--field-2); }
  .btn-lg { padding: 16px 22px; font-size: 15px; }

  /* ---------- Waiting room ---------- */
  .wait-body {
    background: #fff; border-radius: var(--radius-panel);
    padding: 56px 64px;
    display: grid; grid-template-columns: 1.05fr 1fr; gap: 56px;
    min-height: 560px;
  }
  .wait-left { display: flex; flex-direction: column; gap: 28px; }
  .wait-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Geist Mono', monospace; font-size: 12px;
    color: var(--muted); text-transform: uppercase; letter-spacing: .12em;
    align-self: flex-start;
  }
  .wait-eyebrow .pulse {
    width: 8px; height: 8px; border-radius: 999px; background: var(--accent);
    box-shadow: 0 0 0 4px rgba(255,77,31,.18);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .55; transform: scale(.85); }
  }
  .wait-headline {
    font-size: 48px; font-weight: 600; letter-spacing: -0.03em;
    line-height: 1.05; margin: 0;
  }
  .wait-headline em { font-style: normal; color: var(--muted); font-weight: 500; }
  .wait-sub {
    color: var(--muted); font-size: 16px; line-height: 1.55;
    max-width: 44ch; margin: 0;
  }

  .wait-meta {
    background: var(--field-2); border-radius: 18px;
    padding: 22px 24px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px 28px;
  }
  .wait-meta .it { display: flex; flex-direction: column; gap: 4px; }
  .wait-meta .k {
    font-family: 'Geist Mono', monospace; font-size: 11px;
    color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
  }
  .wait-meta .v {
    font-size: 17px; font-weight: 500; letter-spacing: -0.015em;
    line-height: 1.25;
  }
  .wait-meta .v small { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 4px; }

  .wait-hint {
    background: #FFF8F2; border: 1px dashed var(--accent);
    color: var(--accent);
    border-radius: 14px; padding: 14px 18px;
    display: flex; gap: 12px; align-items: flex-start;
    font-size: 14px; line-height: 1.45;
  }
  .wait-hint b { color: var(--ink); font-weight: 500; }

  /* Right: students grid */
  .wait-right { display: flex; flex-direction: column; gap: 18px; }
  .wait-right-head {
    display: flex; align-items: center; justify-content: space-between;
  }
  .wait-right-head h3 {
    margin: 0; font-size: 19px; font-weight: 600; letter-spacing: -0.02em;
  }
  .wait-right-head .count {
    font-family: 'Geist Mono', monospace; font-size: 13px;
    color: var(--ink-3); background: var(--field); padding: 5px 12px; border-radius: 999px;
  }
  .wait-right-head .count b { color: var(--ink); font-weight: 500; }

  .students {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px;
    align-content: start;
    overflow-y: auto;
    max-height: 360px;
    padding-right: 4px;
  }
  .stu {
    display: flex; align-items: center; gap: 10px;
    background: var(--field-2); padding: 9px 12px; border-radius: 12px;
    font-size: 13.5px; color: var(--ink-3);
    position: relative;
  }
  .stu.me {
    background: var(--accent-soft); color: var(--ink);
    border: 1px solid var(--accent); padding: 8px 11px;
  }
  .stu.away { opacity: .5; }
  .stu .av {
    width: 28px; height: 28px; border-radius: 999px; flex: none;
    display: grid; place-items: center;
    font-size: 11.5px; font-weight: 600; color: #fff;
    background: linear-gradient(135deg, #2A2A2A, #4a4a4a);
  }
  .stu .av.me { background: var(--accent); }
  .stu .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stu .led {
    width: 8px; height: 8px; border-radius: 999px; flex: none; background: var(--green);
    margin-left: auto;
    box-shadow: 0 0 0 2px var(--green-soft);
  }
  .stu.away .led { background: var(--muted-2); box-shadow: none; }
  .stu .me-tag {
    font-family: 'Geist Mono', monospace; font-size: 9.5px;
    color: var(--accent); letter-spacing: .1em;
    background: #fff; border-radius: 999px; padding: 2px 6px;
    margin-left: auto;
  }

  /* ---------- Ticket view (matches reference image closely) ---------- */
  .ticket-body {
    background: #fff; border-radius: var(--radius-panel);
    padding: 36px 44px 24px;
    display: grid; grid-template-columns: 1fr 22px 1fr;
    column-gap: 24px;
    min-height: 540px;
  }
  .passage h2 {
    margin: 0 0 6px; font-size: 30px; font-weight: 600; letter-spacing: -0.025em;
  }
  .passage .pcap {
    color: var(--muted); font-style: italic; font-size: 14.5px; margin-bottom: 24px;
  }
  .passage p {
    font-size: 17.5px; line-height: 1.55; color: var(--ink); text-wrap: pretty;
    margin: 0;
  }

  .vsep {
    align-self: stretch; display: flex; justify-content: center; padding-top: 200px;
    position: relative;
  }
  .vsep::before {
    content: ''; position: absolute; top: 0; bottom: 0; left: 50%;
    width: 1px; background: var(--line-2);
  }
  .vsep .grip {
    width: 22px; height: 22px; border-radius: 8px;
    background: var(--field); color: var(--muted);
    display: grid; place-items: center; z-index: 1;
    cursor: grab;
  }

  .opts-pane { display: flex; flex-direction: column; gap: 18px; }
  .opts-toolbar {
    display: flex; align-items: center; gap: 32px;
    color: var(--ink-3); font-size: 14px;
  }
  .toggle-row { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
  .toggle {
    width: 36px; height: 22px; border-radius: 999px; background: #E0E0E0;
    position: relative; transition: background .15s; flex: none;
  }
  .toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px; border-radius: 999px; background: #fff;
    transition: left .15s;
    box-shadow: 0 1px 2px rgba(0,0,0,.15);
  }
  .toggle.on { background: var(--ink); }
  .toggle.on::after { left: 17px; }
  .tool-link {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    color: var(--ink-3);
  }
  .tool-link.bookmark { color: var(--accent); }
  .tool-link.cross    { color: #C77B0C; }
  .tool-link:hover { color: var(--ink); }

  .opts-head {
    font-size: 22px; font-weight: 600; letter-spacing: -0.02em;
    border-top: 1px solid var(--line-2); padding-top: 18px;
  }
  .opts-head.no-border { border-top: 0; padding-top: 0; }
  .opts { display: flex; flex-direction: column; gap: 12px; }
  .opt {
    background: var(--field-2); border-radius: 14px; padding: 18px 20px;
    display: grid; grid-template-columns: 22px 1fr; gap: 16px;
    align-items: center; cursor: pointer;
    border: 1.5px solid transparent;
    transition: background .15s, border-color .15s, box-shadow .15s;
    font-size: 15.5px; line-height: 1.45; color: var(--ink);
  }
  .opt:hover { background: #F0F0F0; }
  .opt.sel {
    background: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(255,77,31,.08);
  }
  .opt .r {
    width: 22px; height: 22px; border-radius: 999px;
    border: 1.5px solid var(--muted-2); position: relative; flex: none;
  }
  .opt.sel .r { border-color: var(--accent); }
  .opt.sel .r::after {
    content: ''; position: absolute; inset: 4px; background: var(--accent); border-radius: 999px;
  }
  .opt.crossed {
    color: var(--muted); text-decoration: line-through;
    text-decoration-thickness: 1.5px;
  }

  /* ---------- Footer ---------- */
  .foot {
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 16px;
    padding: 10px 18px 4px;
  }
  .help {
    width: 38px; height: 38px; border-radius: 999px; background: #fff;
    display: grid; place-items: center; color: var(--muted-2); cursor: pointer;
    box-shadow: var(--shadow-sm);
  }
  .pager {
    justify-self: center;
    background: var(--field); border-radius: 999px; padding: 8px 18px;
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 14px; color: var(--ink); cursor: pointer;
    font-weight: 500;
  }
  .pager .ch { color: var(--muted); }
  .nav { display: flex; gap: 10px; }

  /* ---------- Tweaks-open padding ---------- */
  body.tweaks-open .stage { padding-right: 320px; }

  /* ---------- Verbal pane (right side when question.type === 'verbal') ---------- */
  .verbal-pane { padding-top: 6px; gap: 22px; }
  .verbal-status {
    background: var(--field-2); border-radius: 18px;
    padding: 32px 28px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    gap: 12px;
    transition: background .2s;
  }
  .verbal-status[data-state="recording"] {
    background: #FFF7F2;
    box-shadow: inset 0 0 0 1px var(--accent);
  }
  .verbal-status[data-state="finished"] {
    background: var(--green-soft);
    box-shadow: inset 0 0 0 1px var(--green);
  }
  .verbal-mic {
    width: 88px; height: 88px; border-radius: 999px;
    background: #fff; color: var(--ink);
    display: grid; place-items: center; position: relative;
    box-shadow: 0 1px 2px rgba(0,0,0,.05);
  }
  .verbal-mic svg { width: 36px; height: 36px; stroke-width: 1.5; }
  .verbal-status[data-state="recording"] .verbal-mic { color: var(--accent); }
  .verbal-status[data-state="finished"]  .verbal-mic { color: var(--green); }
  .verbal-ring {
    position: absolute; inset: -8px; border-radius: 999px;
    border: 2px solid var(--accent);
    opacity: .55;
    animation: verbalRing 1.8s ease-out infinite;
  }
  @keyframes verbalRing {
    0%   { transform: scale(.7); opacity: .7; }
    100% { transform: scale(1.15); opacity: 0; }
  }
  .verbal-state-label {
    font-size: 22px; font-weight: 600; letter-spacing: -0.025em;
    color: var(--ink); margin-top: 4px;
  }
  .verbal-state-sub {
    color: var(--muted); font-size: 14.5px; line-height: 1.5;
    max-width: 36ch;
  }

  .verbal-tips {
    list-style: none; margin: 0; padding: 0;
    display: flex; flex-direction: column; gap: 10px;
  }
  .verbal-tips li {
    display: flex; align-items: center; gap: 12px;
    color: var(--ink-3); font-size: 14.5px;
  }
  .verbal-tips li svg { color: var(--accent); flex: none; }

  .verbal-meta {
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--field-2); border-radius: 14px;
    padding: 14px 18px; gap: 12px;
  }
  .verbal-meta > div { display: flex; flex-direction: column; gap: 2px; }
  .verbal-meta .k {
    font-family: 'Geist Mono', monospace; font-size: 10.5px;
    color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
  }
  .verbal-meta .v {
    font-size: 16px; font-weight: 500; letter-spacing: -0.015em; color: var(--ink);
  }

  /* recording timer pill */
  .pill-time.rec {
    background: var(--accent-soft); color: var(--accent);
  }
  .pill-time .rec-dot {
    width: 9px; height: 9px; border-radius: 999px; background: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,77,31,.18);
    animation: recPulse 1.2s ease-in-out infinite;
  }
  @keyframes recPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .45; }
  }

  /* ---------- Join screen ---------- */
  .logo-mini {
    width: 30px; height: 30px; border-radius: 9px; background: var(--ink);
    position: relative; display: inline-block;
  }
  .logo-mini .logo-dot {
    position: absolute; inset: 8px; background: var(--accent); border-radius: 3px;
  }
  .top .title .logo-mini { margin-right: 4px; }

  .join-body {
    background: #fff; border-radius: var(--radius-panel);
    padding: 56px 64px;
    display: grid; grid-template-columns: 1.05fr 1fr; gap: 56px;
    min-height: 560px;
  }
  .join-left { display: flex; flex-direction: column; gap: 28px; }

  .join-right {
    background: var(--field-2); border-radius: 22px;
    padding: 32px;
    display: flex; flex-direction: column; gap: 18px;
    align-self: stretch;
  }
  .join-card-head h3 {
    margin: 0 0 6px; font-size: 22px; font-weight: 600; letter-spacing: -0.02em;
  }
  .join-card-head p { margin: 0 0 6px; color: var(--muted); font-size: 14px; line-height: 1.5; }

  .join-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .j-field { display: flex; flex-direction: column; gap: 7px; min-width: 0; }
  .j-field label {
    font-size: 13px; color: var(--ink-2); font-weight: 500;
    display: flex; gap: 8px; align-items: baseline;
  }
  .j-field label .m-hint { color: var(--muted); font-weight: 400; font-size: 12px; }
  .j-field input {
    appearance: none; border: 1px solid transparent; outline: none;
    background: #fff; border-radius: 12px;
    padding: 14px 16px; font: inherit; font-size: 15px; color: var(--ink);
    width: 100%;
    transition: background .15s, border-color .15s, box-shadow .15s;
  }
  .j-field input::placeholder { color: var(--muted-2); }
  .j-field input:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 4px rgba(10,10,10,.05);
  }

  .j-check {
    display: flex; gap: 12px; align-items: flex-start;
    cursor: pointer; user-select: none;
    font-size: 13.5px; color: var(--ink-3); line-height: 1.45;
    padding: 4px 0;
  }
  .j-box {
    width: 20px; height: 20px; border-radius: 6px;
    border: 1.5px solid var(--muted-2); background: #fff;
    display: grid; place-items: center; flex: none;
    color: transparent;
    transition: background .15s, border-color .15s, color .15s;
  }
  .j-box.on { background: var(--ink); border-color: var(--ink); color: #fff; }

  .j-foot {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 12px;
    font-family: 'Geist Mono', monospace; letter-spacing: .04em;
    padding-top: 2px;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 1080px) {
    .wait-body, .ticket-body, .join-body { padding: 32px; }
    .wait-body, .join-body { grid-template-columns: 1fr; gap: 32px; }
    .ticket-body { grid-template-columns: 1fr; }
    .vsep { display: none; }
    .wait-headline { font-size: 36px; }
    .stage { padding: 12px; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="student-icons.jsx"></script>
<script type="text/babel" src="student-join-view.jsx"></script>
<script type="text/babel" src="student-waiting.jsx"></script>
<script type="text/babel" src="student-ticket-view.jsx"></script>
<script type="text/babel" src="student-main.jsx"></script>

</body>
</html>
